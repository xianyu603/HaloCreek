name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/pages.yml"
      - "pages/**"
      - "scripts/install.ps1"
      - "scripts/install_cn.ps1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy installer page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare site
        shell: bash
        run: |
          mkdir -p _site
          cp -R pages/. _site/
          cp scripts/install.ps1 _site/install.ps1
          cp scripts/install_cn.ps1 _site/install_cn.ps1

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

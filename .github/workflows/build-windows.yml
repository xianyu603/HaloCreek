name: Build Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-windows:
    name: Build win-x64 package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore HaloCreek/HaloCreek.csproj

      - name: Publish
        run: dotnet publish HaloCreek/HaloCreek.csproj -c Release -r win-x64 --self-contained true -o artifacts/publish/win-x64 /p:UsePublishIcon=true

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: HaloCreek-win-x64
          path: artifacts/publish/win-x64/
          retention-days: 30

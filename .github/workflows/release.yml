name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_PATH: HaloCreek/HaloCreek.csproj
  DOTNET_VERSION: 10.0.x
  RUNTIME_ID: win-x64
  PUBLISH_DIR: artifacts/publish/win-x64
  RELEASE_DIR: artifacts/release

jobs:
  release-windows:
    name: Release win-x64 package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $tag = "${{ github.ref_name }}"

          if ($eventName -eq "workflow_dispatch") {
            $tag = "dry-run-${{ github.run_number }}"
            $version = "0.0.0"
            $isDryRun = "true"
          } else {
            if ($tag -notmatch '^v\d+\.\d+(\.\d+)?$') {
              throw "Release tag '$tag' is invalid. Use a tag like v0.1.0."
            }

            $version = $tag.Substring(1)
            $isDryRun = "false"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "is_dry_run=$isDryRun" >> $env:GITHUB_OUTPUT

          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          "IS_DRY_RUN=$isDryRun" >> $env:GITHUB_ENV

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r $env:RUNTIME_ID `
            --self-contained true `
            -o $env:PUBLISH_DIR `
            /p:UsePublishIcon=true `
            /p:Version=$env:RELEASE_VERSION `
            /p:AssemblyVersion=$env:RELEASE_VERSION.0 `
            /p:FileVersion=$env:RELEASE_VERSION.0 `
            /p:DebugType=none `
            /p:DebugSymbols=false

          Get-ChildItem $env:PUBLISH_DIR -Recurse -Filter *.pdb | Remove-Item -Force

      - name: Package
        id: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:RELEASE_DIR | Out-Null

          $zipName = "HaloCreek-$env:RELEASE_VERSION-$env:RUNTIME_ID.zip"
          $zipPath = Join-Path $env:RELEASE_DIR $zipName
          $checksumPath = "$zipPath.sha256"

          Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath $zipPath -Force

          $hash = (Get-FileHash -Algorithm SHA256 $zipPath).Hash.ToLowerInvariant()
          "$hash  $zipName" | Set-Content -Encoding ascii $checksumPath

          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Prepare offline package
        id: offline_package
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $offlineZipName = "HaloCreek-$env:RELEASE_VERSION-$env:RUNTIME_ID-offline.zip"
          $offlineZipPath = Join-Path $env:RELEASE_DIR $offlineZipName
          $offlineChecksumPath = "$offlineZipPath.sha256"
          $releaseSource = if ($env:IS_DRY_RUN -eq "true") {
            "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          } else {
            "https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$env:RELEASE_TAG"
          }

          .\scripts\prepare_offline_pack.ps1 `
            -OutputPath $offlineZipPath `
            -Repository $env:GITHUB_REPOSITORY `
            -HaloCreekZipPath "${{ steps.package.outputs.zip_path }}" `
            -HaloCreekChecksumPath "${{ steps.package.outputs.checksum_path }}" `
            -HaloCreekVersion $env:RELEASE_TAG `
            -HaloCreekSource $releaseSource

          $offlineSizeBytes = (Get-Item -LiteralPath $offlineZipPath).Length
          if ($offlineSizeBytes -ge 2GB) {
            throw "Offline release asset is too large. Size=$offlineSizeBytes bytes, limit is less than 2 GiB."
          }

          $hash = (Get-FileHash -Algorithm SHA256 $offlineZipPath).Hash.ToLowerInvariant()
          "$hash  $offlineZipName" | Set-Content -Encoding ascii $offlineChecksumPath

          "zip_name=$offlineZipName" >> $env:GITHUB_OUTPUT
          "zip_path=$offlineZipPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$offlineChecksumPath" >> $env:GITHUB_OUTPUT
          "size_bytes=$offlineSizeBytes" >> $env:GITHUB_OUTPUT

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: HaloCreek-release-dry-run-${{ github.run_number }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.offline_package.outputs.zip_path }}
            ${{ steps.offline_package.outputs.checksum_path }}
          retention-days: 3

      - name: Create or update GitHub Release
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $zipPath = "${{ steps.package.outputs.zip_path }}"
          $checksumPath = "${{ steps.package.outputs.checksum_path }}"
          $offlineZipPath = "${{ steps.offline_package.outputs.zip_path }}"
          $offlineChecksumPath = "${{ steps.offline_package.outputs.checksum_path }}"

          $assets = @($zipPath, $checksumPath, $offlineZipPath, $offlineChecksumPath)

          if (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $tag $assets --repo $env:GITHUB_REPOSITORY --clobber
            exit 0
          }

          $args = @(
            "release", "create", $tag
            "--repo", $env:GITHUB_REPOSITORY
            "--title", "HaloCreek $tag"
            "--generate-notes"
          )

          $args += $assets
          gh @args

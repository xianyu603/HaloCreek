name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PROJECT_PATH: HaloCreek/HaloCreek.csproj
  DOTNET_VERSION: 10.0.x
  RUNTIME_ID: win-x64
  PUBLISH_DIR: artifacts/publish/win-x64
  RELEASE_DIR: artifacts/release

jobs:
  release-windows:
    name: Release win-x64 package
    runs-on: windows-latest
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
      offline_zip_name: ${{ steps.offline_package.outputs.zip_name }}
      offline_checksum_name: ${{ steps.offline_package.outputs.zip_name }}.sha256
      yun123_share_url: ${{ steps.yun123_upload.outputs.share_url }}
      yun123_folder_id: ${{ steps.yun123_upload.outputs.folder_id }}
      yun123_package_file_id: ${{ steps.yun123_upload.outputs.package_file_id }}
      yun123_checksum_file_id: ${{ steps.yun123_upload.outputs.checksum_file_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $tag = "${{ github.ref_name }}"

          if ($eventName -eq "workflow_dispatch") {
            $tag = "dry-run-${{ github.run_number }}"
            $version = "0.0.0"
            $isDryRun = "true"
          } else {
            if ($tag -notmatch '^v\d+\.\d+(\.\d+)?$') {
              throw "Release tag '$tag' is invalid. Use a tag like v0.1.0."
            }

            $version = $tag.Substring(1)
            $isDryRun = "false"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "is_dry_run=$isDryRun" >> $env:GITHUB_OUTPUT

          "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          "IS_DRY_RUN=$isDryRun" >> $env:GITHUB_ENV

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r $env:RUNTIME_ID `
            --self-contained true `
            -o $env:PUBLISH_DIR `
            /p:UsePublishIcon=true `
            /p:Version=$env:RELEASE_VERSION `
            /p:AssemblyVersion=$env:RELEASE_VERSION.0 `
            /p:FileVersion=$env:RELEASE_VERSION.0 `
            /p:DebugType=none `
            /p:DebugSymbols=false

          Get-ChildItem $env:PUBLISH_DIR -Recurse -Filter *.pdb | Remove-Item -Force

      - name: Package
        id: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:RELEASE_DIR | Out-Null

          $zipName = "HaloCreek-$env:RELEASE_VERSION-$env:RUNTIME_ID.zip"
          $zipPath = Join-Path $env:RELEASE_DIR $zipName
          $checksumPath = "$zipPath.sha256"

          Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath $zipPath -Force

          $hash = (Get-FileHash -Algorithm SHA256 $zipPath).Hash.ToLowerInvariant()
          "$hash  $zipName" | Set-Content -Encoding ascii $checksumPath

          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Prepare offline package
        id: offline_package
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $offlineZipName = "HaloCreek-$env:RELEASE_VERSION-$env:RUNTIME_ID-offline.zip"
          $offlineZipPath = Join-Path $env:RELEASE_DIR $offlineZipName
          $offlineChecksumPath = "$offlineZipPath.sha256"
          $releaseSource = if ($env:IS_DRY_RUN -eq "true") {
            "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          } else {
            "https://github.com/$env:GITHUB_REPOSITORY/releases/tag/$env:RELEASE_TAG"
          }

          .\scripts\prepare_offline_pack.ps1 `
            -OutputPath $offlineZipPath `
            -Repository $env:GITHUB_REPOSITORY `
            -HaloCreekZipPath "${{ steps.package.outputs.zip_path }}" `
            -HaloCreekChecksumPath "${{ steps.package.outputs.checksum_path }}" `
            -HaloCreekVersion $env:RELEASE_TAG `
            -HaloCreekSource $releaseSource

          $offlineSizeBytes = (Get-Item -LiteralPath $offlineZipPath).Length
          if ($offlineSizeBytes -ge 2GB) {
            throw "Offline release asset is too large. Size=$offlineSizeBytes bytes, limit is less than 2 GiB."
          }

          $hash = (Get-FileHash -Algorithm SHA256 $offlineZipPath).Hash.ToLowerInvariant()
          "$hash  $offlineZipName" | Set-Content -Encoding ascii $offlineChecksumPath

          "zip_name=$offlineZipName" >> $env:GITHUB_OUTPUT
          "zip_path=$offlineZipPath" >> $env:GITHUB_OUTPUT
          "checksum_path=$offlineChecksumPath" >> $env:GITHUB_OUTPUT
          "size_bytes=$offlineSizeBytes" >> $env:GITHUB_OUTPUT

      - name: Upload dry-run artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: HaloCreek-release-dry-run-${{ github.run_number }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.offline_package.outputs.zip_path }}
            ${{ steps.offline_package.outputs.checksum_path }}
          retention-days: 3

      - name: Create or update GitHub Release
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $zipPath = "${{ steps.package.outputs.zip_path }}"
          $checksumPath = "${{ steps.package.outputs.checksum_path }}"
          $offlineZipPath = "${{ steps.offline_package.outputs.zip_path }}"
          $offlineChecksumPath = "${{ steps.offline_package.outputs.checksum_path }}"

          $assets = @($zipPath, $checksumPath, $offlineZipPath, $offlineChecksumPath)

          if (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $tag $assets --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            exit 0
          }

          $args = @(
            "release", "create", $tag
            "--repo", $env:GITHUB_REPOSITORY
            "--title", "HaloCreek $tag"
            "--generate-notes"
          )

          $args += $assets
          gh @args
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload offline package to 123 Cloud
        id: yun123_upload
        shell: pwsh
        env:
          YUN123_CLIENT_ID: ${{ secrets.YUN123_CLIENT_ID }}
          YUN123_CLIENT_SECRET: ${{ secrets.YUN123_CLIENT_SECRET }}
          YUN123_PARENT_FILE_ID: ${{ vars.YUN123_PARENT_FILE_ID }}
          YUN123_FOLDER_PATH: ${{ vars.YUN123_FOLDER_PATH }}
          YUN123_SHARE_EXPIRE: ${{ vars.YUN123_SHARE_EXPIRE }}
          YUN123_SHARE_PASSWORD: ${{ secrets.YUN123_SHARE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:YUN123_CLIENT_ID) -or
              [string]::IsNullOrWhiteSpace($env:YUN123_CLIENT_SECRET)) {
            Write-Warning "Skip 123 Cloud upload because YUN123_CLIENT_ID or YUN123_CLIENT_SECRET is not configured."
            exit 0
          }

          $parentFileID = if ([string]::IsNullOrWhiteSpace($env:YUN123_PARENT_FILE_ID)) {
            0
          } else {
            [long]$env:YUN123_PARENT_FILE_ID
          }

          $folderPath = if ([string]::IsNullOrWhiteSpace($env:YUN123_FOLDER_PATH)) {
            "HaloCreek/releases"
          } else {
            $env:YUN123_FOLDER_PATH
          }

          $shareExpire = if ([string]::IsNullOrWhiteSpace($env:YUN123_SHARE_EXPIRE)) {
            0
          } else {
            [int]$env:YUN123_SHARE_EXPIRE
          }

          .\scripts\publish_to_123yun.ps1 `
            -PackagePath "${{ steps.offline_package.outputs.zip_path }}" `
            -ChecksumPath "${{ steps.offline_package.outputs.checksum_path }}" `
            -ClientID $env:YUN123_CLIENT_ID `
            -ClientSecret $env:YUN123_CLIENT_SECRET `
            -ReleaseTag "${{ steps.release.outputs.tag }}" `
            -ParentFileID $parentFileID `
            -FolderPath $folderPath `
            -ShareExpire $shareExpire `
            -SharePassword $env:YUN123_SHARE_PASSWORD

      - name: Write 123 Cloud share artifact
        if: steps.yun123_upload.outputs.share_url != ''
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          OFFLINE_ZIP_NAME: ${{ steps.offline_package.outputs.zip_name }}
          OFFLINE_CHECKSUM_NAME: ${{ steps.offline_package.outputs.zip_name }}.sha256
          YUN123_SHARE_URL: ${{ steps.yun123_upload.outputs.share_url }}
          YUN123_FOLDER_ID: ${{ steps.yun123_upload.outputs.folder_id }}
          YUN123_PACKAGE_FILE_ID: ${{ steps.yun123_upload.outputs.package_file_id }}
          YUN123_CHECKSUM_FILE_ID: ${{ steps.yun123_upload.outputs.checksum_file_id }}
        run: |
          $outputDir = Join-Path $env:RELEASE_DIR "123-cloud"
          New-Item -ItemType Directory -Force $outputDir | Out-Null

          $shareTextPath = Join-Path $outputDir "123-cloud-share.txt"
          $shareJsonPath = Join-Path $outputDir "123-cloud-share.json"

          $share = [ordered]@{
            schemaVersion       = 1
            releaseTag          = $env:RELEASE_TAG
            offlineZipName      = $env:OFFLINE_ZIP_NAME
            offlineChecksumName = $env:OFFLINE_CHECKSUM_NAME
            shareUrl            = $env:YUN123_SHARE_URL
            folderId            = $env:YUN123_FOLDER_ID
            packageFileId       = $env:YUN123_PACKAGE_FILE_ID
            checksumFileId      = $env:YUN123_CHECKSUM_FILE_ID
            generatedAtUtc      = [DateTime]::UtcNow.ToString("o")
          }

          $env:YUN123_SHARE_URL | Set-Content -LiteralPath $shareTextPath -Encoding utf8
          $share | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath $shareJsonPath -Encoding utf8

      - name: Upload 123 Cloud share artifact
        if: steps.yun123_upload.outputs.share_url != ''
        uses: actions/upload-artifact@v6
        with:
          name: HaloCreek-123-cloud-share-${{ steps.release.outputs.tag }}
          path: artifacts/release/123-cloud/
          retention-days: 30

      - name: Add 123 Cloud link to GitHub Release
        if: github.event_name == 'push' && steps.yun123_upload.outputs.share_url != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          YUN123_SHARE_URL: ${{ steps.yun123_upload.outputs.share_url }}
          OFFLINE_ZIP_NAME: ${{ steps.offline_package.outputs.zip_name }}
          OFFLINE_CHECKSUM_NAME: ${{ steps.offline_package.outputs.zip_name }}.sha256
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $body = gh release view $tag --repo $env:GITHUB_REPOSITORY --json body --jq ".body"

          $markerStart = "<!-- halocreek-123yun-start -->"
          $markerEnd = "<!-- halocreek-123yun-end -->"
          $pattern = "(?s)\r?\n?$([regex]::Escape($markerStart)).*?$([regex]::Escape($markerEnd))\r?\n?"
          $body = [regex]::Replace($body, $pattern, "").TrimEnd()

          $block = @"
$markerStart
## 123 云盘国内下载

- 离线安装包：$env:YUN123_SHARE_URL
- 包名：$env:OFFLINE_ZIP_NAME
- 校验文件：$env:OFFLINE_CHECKSUM_NAME
$markerEnd
"@

          $newBody = if ([string]::IsNullOrWhiteSpace($body)) {
            $block
          } else {
            $body + [Environment]::NewLine + [Environment]::NewLine + $block
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -LiteralPath $notesPath -Value $newBody -Encoding utf8
          gh release edit $tag --repo $env:GITHUB_REPOSITORY --notes-file $notesPath

  deploy-pages-with-downloads:
    name: Deploy installer page with download links
    needs: release-windows
    if: needs.release-windows.outputs.yun123_share_url != ''
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare site
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release-windows.outputs.release_tag }}
          OFFLINE_ZIP_NAME: ${{ needs.release-windows.outputs.offline_zip_name }}
          OFFLINE_CHECKSUM_NAME: ${{ needs.release-windows.outputs.offline_checksum_name }}
          YUN123_SHARE_URL: ${{ needs.release-windows.outputs.yun123_share_url }}
          YUN123_FOLDER_ID: ${{ needs.release-windows.outputs.yun123_folder_id }}
          YUN123_PACKAGE_FILE_ID: ${{ needs.release-windows.outputs.yun123_package_file_id }}
          YUN123_CHECKSUM_FILE_ID: ${{ needs.release-windows.outputs.yun123_checksum_file_id }}
        run: |
          mkdir -p _site
          cp -R pages/. _site/
          cp scripts/install.ps1 _site/install.ps1

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          downloads = {
              "schemaVersion": 1,
              "releaseTag": os.environ["RELEASE_TAG"],
              "offlineZipName": os.environ["OFFLINE_ZIP_NAME"],
              "offlineChecksumName": os.environ["OFFLINE_CHECKSUM_NAME"],
              "yun123ShareUrl": os.environ["YUN123_SHARE_URL"],
              "yun123FolderId": os.environ["YUN123_FOLDER_ID"],
              "yun123PackageFileId": os.environ["YUN123_PACKAGE_FILE_ID"],
              "yun123ChecksumFileId": os.environ["YUN123_CHECKSUM_FILE_ID"],
              "generatedAtUtc": datetime.now(timezone.utc).isoformat(),
          }

          with open("_site/downloads.json", "w", encoding="utf-8") as f:
              json.dump(downloads, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

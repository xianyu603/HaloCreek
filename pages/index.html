<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HaloCreek Installer</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f6f7f9;
      color: #17191c;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100% - 32px));
    }

    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: #4b5563;
      font-size: 17px;
      line-height: 1.6;
    }

    pre {
      margin: 0;
      padding: 18px;
      overflow-x: auto;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      background: #111827;
      color: #f9fafb;
      font-size: 15px;
      line-height: 1.5;
    }

    a {
      color: #2563eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #111418;
        color: #f3f4f6;
      }

      p {
        color: #b8c0cc;
      }

      pre {
        border-color: #303946;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>HaloCreek</h1>
    <p>Install the latest Windows release from GitHub Releases, including runtime dependencies.</p>
    <pre><code>irm https://xianyu603.github.io/HaloCreek/install.ps1 | iex</code></pre>
    <p><a href="./install.ps1">View installer script</a></p>
  </main>
</body>
</html>
